upstream web_app {
    server fastapi:8000;
}

server {
    listen 80;
    server_name dev.en.etu.ru;
    server_tokens off;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.en.etu.ru;
    server_tokens off;
    ssl_certificate /etc/letsencrypt/live/dev.en.etu.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.en.etu.ru/privkey.pem;

    location = /favicon.ico {
      root /var/www/dev.en.etu.ru/static;
    }

    location /static/ {
        root /var/www/dev.en.etu.ru;
        if ($request_uri ~ ^/(.*)\.html(\?|$)) {
            return 302 /$1$is_args$args;
        }
        try_files $uri $uri.html $uri/index.html =404;
    }

    location / {
        proxy_pass http://web_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}